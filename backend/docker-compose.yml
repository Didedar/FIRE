version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fire_user
      POSTGRES_PASSWORD: fire_password
      POSTGRES_DB: fire_db
    ports:
      - "5433:5432"
    volumes:
      - fire_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fire_user -d fire_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fire_user:fire_password@postgres:5432/fire_db
      DATABASE_URL_ASYNC: postgresql+asyncpg://fire_user:fire_password@postgres:5432/fire_db
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ./csv_storage:/app/csv_storage
      - ../tickets.csv:/app/../tickets.csv:ro
      - ../managers.csv:/app/../managers.csv:ro
      - ../business_units.csv:/app/../business_units.csv:ro

volumes:
  fire_pgdata:
